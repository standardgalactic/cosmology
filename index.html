<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal Reading Room</title>

<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  color:#7cff7c;
  font-family:monospace;
  touch-action:manipulation;
}

body{
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* CRT scanlines */
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:500;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.028) 0px,
      rgba(255,255,255,.028) 1px,
      transparent 2px,
      transparent 4px
    );
  opacity:.14;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:501;
  background:
    radial-gradient(
      circle at center,
      transparent 0%,
      rgba(0,0,0,.25) 72%,
      rgba(0,0,0,.72) 100%
    );
}

/* splash */

#languageMenu{
  position:fixed;
  inset:0;
  z-index:900;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(
      circle at center,
      rgba(0,35,15,.96),
      rgba(0,0,0,1)
    );
}

.language-panel{
  width:min(440px,90vw);
  padding:38px 32px;
  border:1px solid rgba(0,255,120,.28);
  background:rgba(0,12,0,.88);
  box-shadow:
    0 0 45px rgba(0,255,120,.12),
    inset 0 0 40px rgba(0,255,120,.04);
  text-align:center;
}

.language-title{
  color:#d8fff0;
  font-size:20px;
  letter-spacing:.24em;
  line-height:1.4;
  text-shadow:0 0 12px #00ff88;
  margin-bottom:18px;
}

.language-subtitle{
  color:#9effd0;
  opacity:.68;
  font-size:12px;
  letter-spacing:.18em;
  margin-bottom:28px;
}

.lang-btn{
  width:100%;
  margin:8px 0;
  padding:14px 16px;
  background:rgba(0,28,10,.76);
  border:1px solid rgba(0,255,120,.32);
  color:#d8fff0;
  font-family:monospace;
  font-size:13px;
  letter-spacing:.16em;
  cursor:pointer;
  transition:.16s;
}

.lang-btn:hover{
  background:rgba(0,80,30,.50);
  border-color:rgba(0,255,120,.80);
  box-shadow:0 0 18px rgba(0,255,120,.2);
}

/* visualizer */

#app{
  display:none;
  width:100%;
  height:100%;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

.title{
  position:fixed;
  top:18px;
  left:50%;
  transform:translateX(-50%);
  width:min(96vw,920px);
  text-align:center;
  font-size:14px;
  letter-spacing:.20em;
  color:#00ff88;
  text-transform:uppercase;
  text-shadow:0 0 10px #00ff66;
  z-index:100;
}

.selector{
  position:fixed;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
  width:min(94vw,760px);
  z-index:120;
  cursor:default;
}

.selector button{
  background:#001400;
  border:1px solid rgba(0,255,100,.55);
  color:#7cff7c;
  padding:6px 10px;
  font-family:monospace;
  font-size:10px;
  letter-spacing:.10em;
  cursor:pointer;
}

.selector button.active{
  background:#003d1a;
  color:#eaffea;
  box-shadow:0 0 8px #00ff66 inset;
}

.status{
  position:fixed;
  top:90px;
  left:50%;
  transform:translateX(-50%);
  opacity:.45;
  font-size:10px;
  letter-spacing:.16em;
  z-index:120;
  text-align:center;
  width:96vw;
}

canvas{
  width:min(440px,84vw);
  height:min(440px,84vw);
  border-radius:50%;
  border:2px solid rgba(0,255,0,.48);
  background:#000;
  box-shadow:
    0 0 44px rgba(0,255,120,.18) inset,
    0 0 20px rgba(0,255,0,.62);
  z-index:40;
}

.subs{
  position:fixed;
  bottom:38px;
  width:min(560px,92vw);
  text-align:center;
  padding:7px 11px;
  font-size:14px;
  line-height:1.45;
  color:#aaffaa;
  text-shadow:0 0 6px #00ff66;
  background:rgba(0,20,0,.36);
  border:1px solid rgba(0,255,0,.22);
  border-radius:6px;
  pointer-events:none;
  min-height:2.4em;
  z-index:80;
}

.link{
  position:fixed;
  bottom:7px;
  width:min(720px,94vw);
  text-align:center;
  font-size:11px;
  line-height:1.3;
  color:#7cffc4;
  text-decoration:none;
  opacity:.72;
  z-index:90;
  letter-spacing:.06em;
}

.link:hover{
  opacity:1;
}

@media(max-width:700px){
  .title{
    font-size:11px;
    top:14px;
  }

  .selector{
    top:44px;
  }

  .selector button{
    font-size:8px;
    padding:6px 7px;
  }

  .status{
    top:88px;
    font-size:9px;
  }

  .subs{
    bottom:40px;
    font-size:13px;
  }

  .link{
    font-size:10px;
  }
}
</style>
</head>

<body>

<div id="languageMenu">
  <div class="language-panel">
    <div class="language-title">
      UNIVERSAL<br>READING ROOM
    </div>

    <div class="language-subtitle">
      SELECT LANGUAGE / IDIOMA
    </div>

    <button class="lang-btn" id="englishBtn">
      ENGLISH
    </button>

    <button class="lang-btn" id="spanishBtn">
      ESPAÑOL
    </button>
  </div>
</div>

<div id="app">

  <div class="title" id="title">
    Universal Reading Room
  </div>

  <div class="selector" id="selector"></div>

  <div class="status">
    TOUCH / CLICK ANYWHERE TO PLAY OR PAUSE
  </div>

  <canvas id="viz"></canvas>

  <div id="subs" class="subs"></div>

  <a class="link" id="essayLink" href="#" target="_blank">
    Essay
  </a>

</div>

<audio id="audio" preload="auto"></audio>

<script>
const PLAYLISTS = {
  english: [
    {
      file: "The_Universe_Is_Just_Relaxing.mp3",
      vtt: "The_Universe_Is_Just_Relaxing.vtt",
      label: "Relaxing",
      title: "The Universe Is Just Relaxing",
      essayTitle: "Accessibility Relaxation and Friedmann Instability",
      essayUrl: "https://standardgalactic.github.io/cosmology/accessibility-relaxation.pdf",
      mode: "cosmology"
    },
    {
      file: "The_Geometry_of_Document_Rewriting.mp3",
      vtt: "The_Geometry_of_Document_Rewriting.vtt",
      label: "Rewriting",
      title: "The Geometry of Document Rewriting",
      essayTitle: "Document Perturbation as Constrained Navigation on a Semantic Manifold",
      essayUrl: "https://standardgalactic.github.io/cosmlogly/docperturb.pdf",
      mode: "rewriting"
    }
  ],

  spanish: [
    {
      file: "El_Universo_Se_Relaja_Sin_Energía_Oscura.mp3",
      vtt: "El_Universo_Se_Relaja_Sin_Energía_Oscura.vtt",
      label: "Relajación",
      title: "El Universo Se Relaja Sin Energía Oscura",
      essayTitle: "Accessibility Relaxation and Friedmann Instability",
      essayUrl: "https://standardgalactic.github.io/cosmology/accessibility-relaxation.pdf",
      mode: "cosmology"
    }
  ]
}

let playlist = []
let trackIndex = 0
let currentMode = "cosmology"

/* elements */

const languageMenu = document.getElementById("languageMenu")
const app = document.getElementById("app")
const title = document.getElementById("title")
const selector = document.getElementById("selector")
const essayLink = document.getElementById("essayLink")

const audio = document.getElementById("audio")
const subs = document.getElementById("subs")

document.getElementById("englishBtn").onclick = e=>{
  e.stopPropagation()
  selectLanguage("english")
}

document.getElementById("spanishBtn").onclick = e=>{
  e.stopPropagation()
  selectLanguage("spanish")
}

essayLink.onclick = e=>e.stopPropagation()

/* language selection */

function selectLanguage(lang){
  playlist = PLAYLISTS[lang]
  trackIndex = 0

  languageMenu.style.display = "none"
  app.style.display = "flex"

  buildSelector()
  loadTrack(0,false)
}

function buildSelector(){
  selector.innerHTML = ""

  playlist.forEach((track,i)=>{
    const btn = document.createElement("button")
    btn.textContent = track.label
    btn.onclick = async e=>{
      e.stopPropagation()
      initAudio()
      if(ctx.state === "suspended") await ctx.resume()
      await loadTrack(i,true)
    }
    selector.appendChild(btn)
  })
}

function updateButtons(){
  const buttons = [...selector.querySelectorAll("button")]
  buttons.forEach((b,i)=>{
    b.classList.toggle("active", i === trackIndex)
  })
}

/* audio */

let ctx
let analyser
let data

function initAudio(){
  if(ctx) return

  ctx = new (
    window.AudioContext ||
    window.webkitAudioContext
  )()

  analyser = ctx.createAnalyser()
  analyser.fftSize = 2048
  analyser.smoothingTimeConstant = 0.86

  data = new Uint8Array(analyser.fftSize)

  const node = ctx.createMediaElementSource(audio)
  node.connect(analyser)
  analyser.connect(ctx.destination)
}

async function loadTrack(i, autoplay=true){
  trackIndex =
    ((i % playlist.length) + playlist.length)
    % playlist.length

  const track = playlist[trackIndex]

  currentMode = track.mode

  audio.src = track.file
  audio.load()

  title.textContent = track.title

  essayLink.href = track.essayUrl
  essayLink.textContent = track.essayTitle

  updateButtons()

  await loadVTT(track.vtt)

  if(autoplay){
    try{
      await audio.play()
    }catch(e){}
  }
}

audio.addEventListener("ended", ()=>{
  loadTrack(trackIndex + 1,true)
})

document.body.onclick = async ()=>{
  if(app.style.display !== "flex") return

  initAudio()

  if(ctx.state === "suspended")
    await ctx.resume()

  if(audio.paused){
    await audio.play()
  }else{
    audio.pause()
  }
}

/* subtitles */

let cues = []

async function loadVTT(url){
  cues = []
  subs.textContent = ""

  try{
    const res = await fetch(url)
    if(!res.ok){
      console.warn("Missing VTT:", url)
      return
    }

    const text = await res.text()
    cues = parseVTT(text)
  }catch(e){
    console.warn("VTT load failed:", e)
  }
}

function parseVTT(text){
  const blocks = text
    .replace(/\r/g,"")
    .split(/\n{2,}/)

  const out = []

  for(const block of blocks){
    const lines = block.trim().split("\n")
    const ts = lines.find(l=>l.includes("-->"))
    if(!ts) continue

    const tsIndex = lines.indexOf(ts)
    const parts = ts.split("-->").map(x=>x.trim())

    out.push({
      start: parseTime(parts[0]),
      end: parseTime(parts[1]),
      text: lines.slice(tsIndex + 1).join(" ")
    })
  }

  return out
}

function parseTime(t){
  t = t.split(" ")[0].replace(",",".")
  const p = t.split(":")

  if(p.length === 3){
    return (+p[0])*3600 + (+p[1])*60 + parseFloat(p[2])
  }

  return (+p[0])*60 + parseFloat(p[1])
}

audio.ontimeupdate = ()=>{
  const t = audio.currentTime
  const cue = cues.find(c=>t >= c.start && t < c.end + .20)
  subs.textContent = cue ? cue.text : ""
}

/* canvas */

const canvas = document.getElementById("viz")
const c = canvas.getContext("2d")

const W = 360
const H = 360

canvas.width = W
canvas.height = H

let frame = 0
let bassSmooth = 0
let midSmooth = 0
let highSmooth = 0

function updateAudioEnergy(){
  if(!analyser) return

  analyser.getByteFrequencyData(data)

  let bass = 0
  let mid = 0
  let high = 0

  for(let i=0;i<48;i++) bass += data[i]
  for(let i=48;i<220;i++) mid += data[i]
  for(let i=220;i<760;i++) high += data[i]

  bass /= 48 * 255
  mid /= 172 * 255
  high /= 540 * 255

  bassSmooth += (bass - bassSmooth) * .08
  midSmooth += (mid - midSmooth) * .06
  highSmooth += (high - highSmooth) * .05
}

function drawGrid(cx,cy,R){
  const shiftX = Math.sin(frame*.0011) * 18
  const shiftY = Math.cos(frame*.0014) * 18

  c.strokeStyle =
    currentMode === "cosmology"
    ? "rgba(0,255,120,.070)"
    : "rgba(0,255,120,.045)"

  c.lineWidth = 1

  for(let x=-W; x<W*2; x+=24){
    c.beginPath()

    if(currentMode === "rewriting"){
      for(let y=-H; y<H*2; y+=8){
        const warp =
          Math.sin(y*.045 + frame*.018 + x*.02)
          * (4 + midSmooth*20)

        if(y === -H)
          c.moveTo(x + shiftX + warp, y)
        else
          c.lineTo(x + shiftX + warp, y)
      }
    }else{
      c.moveTo(x + shiftX, -H)
      c.lineTo(x + shiftX, H*2)
    }

    c.stroke()
  }

  for(let y=-H; y<H*2; y+=24){
    c.beginPath()

    if(currentMode === "rewriting"){
      for(let x=-W; x<W*2; x+=8){
        const warp =
          Math.cos(x*.045 + frame*.014 + y*.02)
          * (4 + highSmooth*18)

        if(x === -W)
          c.moveTo(x, y + shiftY + warp)
        else
          c.lineTo(x, y + shiftY + warp)
      }
    }else{
      c.moveTo(-W, y + shiftY)
      c.lineTo(W*2, y + shiftY)
    }

    c.stroke()
  }
}

function drawCosmology(cx,cy,R){
  const breath =
    1 + Math.sin(frame*.012) * .025 + bassSmooth*.06

  c.save()
  c.translate(cx,cy)

  for(let k=0;k<18;k++){
    const r = R * (.12 + k*.047) * breath

    c.beginPath()

    for(let a=0; a<=Math.PI*2+.03; a+=.05){
      const wave =
        Math.sin(a*5 + frame*.018 + k*.45)
        * (1.6 + midSmooth*7)

      const x = Math.cos(a) * (r + wave)
      const y = Math.sin(a) * (r + wave*.7)

      a===0 ? c.moveTo(x,y) : c.lineTo(x,y)
    }

    c.strokeStyle = `rgba(124,255,196,${.025 + k*.006})`
    c.stroke()
  }

  for(let i=0;i<80;i++){
    const a = i/80 * Math.PI*2 + frame*.0015
    const inner = R*.10
    const outer = R*(.78 + bassSmooth*.12)
    const curl = Math.sin(a*8 + frame*.02) * midSmooth * 18

    c.beginPath()
    c.moveTo(
      Math.cos(a)*inner,
      Math.sin(a)*inner
    )
    c.lineTo(
      Math.cos(a)*(outer + curl),
      Math.sin(a)*(outer - curl*.25)
    )

    c.strokeStyle = `rgba(0,255,136,${.018 + highSmooth*.04})`
    c.stroke()
  }

  c.restore()
}

function drawRewriting(cx,cy,R){
  c.save()
  c.translate(cx,cy)

  for(let layer=0; layer<15; layer++){
    c.beginPath()

    const y =
      -R*.58 + layer * (R*.08)

    for(let i=-120;i<=120;i++){
      const x = i
      const fold =
        Math.sin(i*.075 + frame*.025 + layer*.6)
        * (3 + midSmooth*18)

      const tear =
        Math.sin(i*.19 - frame*.018 + layer)
        * highSmooth * 16

      if(i===-120)
        c.moveTo(x,y + fold + tear)
      else
        c.lineTo(x,y + fold + tear)
    }

    c.strokeStyle =
      `rgba(124,255,196,${.05 + layer*.018})`

    c.stroke()
  }

  for(let i=0;i<36;i++){
    const a = i/36 * Math.PI*2 + frame*.004
    const r = R*(.18 + (i%9)*.055)

    c.beginPath()
    c.arc(
      Math.cos(a)*r*.38,
      Math.sin(a*1.3)*r*.28,
      4 + midSmooth*12,
      0,
      Math.PI*2
    )

    c.strokeStyle =
      `rgba(0,255,136,${.03 + highSmooth*.08})`

    c.stroke()
  }

  c.restore()
}

function drawWaveTrace(cx,cy,R){
  if(!analyser) return

  analyser.getByteTimeDomainData(data)

  const lag =
    currentMode === "cosmology"
    ? Math.floor(data.length * (.11 + bassSmooth*.08))
    : Math.floor(data.length * (.18 + midSmooth*.18))

  const driftAmp =
    currentMode === "cosmology"
    ? 8
    : 18

  const driftX = Math.sin(frame*.002) * driftAmp
  const driftY = Math.cos(frame*.0017) * driftAmp*.7

  c.beginPath()

  for(let i=0;i<data.length;i++){
    const a = (data[i]-128)/128
    const b = (data[(i+lag)%data.length]-128)/128

    const twist =
      currentMode === "rewriting"
      ? Math.sin(i*.08 + frame*.02) * highSmooth * 14
      : 0

    const x = cx + driftX + a*R + twist
    const y = cy + driftY + b*R*.88

    i ? c.lineTo(x,y) : c.moveTo(x,y)
  }

  c.strokeStyle =
    currentMode === "cosmology"
    ? "#7cffc4"
    : "#aaffaa"

  c.lineWidth =
    currentMode === "cosmology"
    ? 2.3
    : 1.7

  c.shadowBlur =
    currentMode === "cosmology"
    ? 12
    : 20

  c.shadowColor = "#00ff66"
  c.stroke()
  c.shadowBlur = 0
}

function draw(){
  frame++

  updateAudioEnergy()

  c.fillStyle =
    currentMode === "cosmology"
    ? "rgba(0,5,0,.075)"
    : "rgba(0,5,0,.060)"

  c.fillRect(0,0,W,H)

  const cx = W/2
  const cy = H/2
  const R = W*.42

  c.save()

  c.beginPath()
  c.arc(cx,cy,R,0,Math.PI*2)
  c.clip()

  drawGrid(cx,cy,R)

  if(currentMode === "cosmology"){
    drawCosmology(cx,cy,R)
  }else{
    drawRewriting(cx,cy,R)
  }

  drawWaveTrace(cx,cy,R)

  c.restore()

  requestAnimationFrame(draw)
}

draw()
</script>
</body>
</html>
